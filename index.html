    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { overflow: hidden; font-family: sans-serif; background: #000; }
      #preview-bg {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1;
        background: url('assets/mural-preview.png') center center / cover no-repeat;
        display: none;
      }
      #preview-bg.visible { display: block; }
      #topbar {
        position: fixed; top: 0; left: 0; right: 0;
        z-index: 100;
        background: rgba(255,255,255,0.97);
        padding: 10px 12px 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      }
      #topbar h1 { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
      #filter-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
      .tab {
        padding: 4px 12px; border-radius: 20px; font-size: 11px;
        font-weight: 500; border: none; cursor: pointer;
        white-space: nowrap; opacity: 0.45; transition: opacity 0.2s;
      }
      .tab.active { opacity: 1; }
      .tab-all { background: #1a1a1a; color: white; }
      .tab-pulau { background: #3B6D11; color: white; }
      .tab-pekan { background: #A32D2D; color: white; }
      .tab-sikuati { background: #BA5D0B; color: white; }
      .tab-matunggong { background: #BA7517; color: white; }
      #pins-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 50; pointer-events: none;
      }
      .pin {
        position: absolute;
        border-radius: 50%; border: 2px solid white;
        display: flex; align-items: center; justify-content: center;
        font-size: 9px; font-weight: 700; color: white;
        cursor: pointer; pointer-events: all;
        transform: translate(-50%, -50%);
        box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        transition: transform 0.15s;
        width: 20px; height: 20px;
      }
      .pin:active { transform: translate(-50%, -50%) scale(0.88); }
      .pin-pulau { background: #3B6D11; }
      .pin-pekan { background: #A32D2D; }
      .pin-sikuati { background: #BA5D0B; }
      .pin-matunggong { background: #BA7517; }
      .pin.hidden { display: none; }
      .pin-cluster { width: 28px; height: 28px; font-size: 11px; border-width: 2.5px; }
      #zone-list-card {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
        background: white; border-radius: 20px 20px 0 0;
        padding: 16px 20px 36px;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
        transform: translateY(100%); transition: transform 0.3s ease;
        max-height: 75vh; overflow-y: auto;
      }
      #zone-list-card.visible { transform: translateY(0); }
      #info-card {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
        background: white; border-radius: 20px 20px 0 0;
        padding: 16px 20px 36px;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
        transform: translateY(100%); transition: transform 0.3s ease;
        max-height: 70vh; overflow-y: auto;
      }
      #info-card.visible { transform: translateY(0); }
      .card-handle {
        width: 40px; height: 4px; background: #ddd;
        border-radius: 2px; margin: 0 auto 14px;
      }
      .card-header {
        display: flex; justify-content: space-between;
        align-items: flex-start; margin-bottom: 12px;
      }
      .card-title { font-size: 15px; font-weight: 600; color: #1a1a1a; flex: 1; line-height: 1.3; }
      .card-zone-badge {
        font-size: 10px; font-weight: 500; padding: 3px 8px;
        border-radius: 10px; color: white; margin-left: 8px; flex-shrink: 0;
      }
      .close-btn {
        background: none; border: none; font-size: 20px;
        cursor: pointer; color: #888; padding: 0 0 0 8px; flex-shrink: 0;
      }
      .card-row {
        display: flex; justify-content: space-between;
        padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 12px;
      }
      .card-row:last-of-type { border-bottom: none; }
      .card-label { color: #888; flex-shrink: 0; margin-right: 8px; }
      .card-value { font-weight: 500; color: #1a1a1a; text-align: right; }
      #maps-btn {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        width: 100%; margin-top: 14px; padding: 12px;
        background: #1a73e8; color: white; border: none;
        border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer;
      }
      .zone-list-header {
        display: flex; justify-content: space-between;
        align-items: center; margin-bottom: 10px;
      }
      .zone-list-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
      .zone-ketua {
        font-size: 11px; color: #555; margin-bottom: 12px;
        padding: 8px 10px; background: #f8f8f8; border-radius: 8px;
      }
      .school-item {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer;
      }
      .school-item:last-child { border-bottom: none; }
      .school-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
      .school-name { font-size: 13px; color: #1a1a1a; flex: 1; }
      .school-code { font-size: 11px; color: #888; }
      #detecting-screen {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        z-index: 300; background: rgba(0,0,0,0.55);
        display: flex; align-items: center; justify-content: center;
      }
      #detecting-screen.hidden { display: none; }
      .detect-box {
        background: rgba(0,0,0,0.75); border-radius: 16px;
        padding: 24px 32px; text-align: center; color: white;
      }
      .detect-icon { font-size: 32px; margin-bottom: 8px; }
      .detect-title { font-size: 15px; font-weight: 600; }
      .detect-sub { font-size: 11px; color: #bbb; margin-top: 4px; }
      #overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        z-index: 150; display: none;
      }
      #overlay.visible { display: block; }
      #preview-btn {
        position: fixed; bottom: 20px; right: 16px; z-index: 400;
        background: rgba(0,0,0,0.6); color: white; border: none;
        border-radius: 20px; padding: 6px 12px; font-size: 11px; cursor: pointer;
      }
    </style>

        filtered.forEach((s, i) => {
          if (used.has(s.id)) return;
          const group = [s];
          used.add(s.id);
          filtered.forEach((t, j) => {
            if (i === j || used.has(t.id)) return;
            const dx = s.x - t.x, dy = s.y - t.y;
            if (Math.sqrt(dx*dx + dy*dy) < CLUSTER_THRESHOLD) {
              group.push(t); used.add(t.id);
            }
          });
          const cx = group.reduce((a,p) => a+p.x,0)/group.length;
          const cy = group.reduce((a,p) => a+p.y,0)/group.length;
          clusters.push({ schools: group, x: cx, y: cy, zone: s.zone });
        });
        return clusters;
      }
      function buildPins(filter = 'all') {
        const overlay = document.getElementById('pins-overlay');
        overlay.innerHTML = '';
        const filtered = filter === 'all' ? schools : schools.filter(s => s.zone === filter);
        const clusters = clusterPins(filtered);
        clusters.forEach(cluster => {
          const pin = document.createElement('div');
          const isCluster = cluster.schools.length > 1;
          pin.className = `pin pin-${cluster.zone}${isCluster ? ' pin-cluster' : ''}`;
          pin.style.left = cluster.x + '%';
          pin.style.top = cluster.y + '%';
          pin.innerHTML = isCluster ? cluster.schools.length : '●';
          pin.title = isCluster ? `${cluster.schools.length} sekolah` : cluster.schools[0].name;
          pin.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isCluster) showZoneList(cluster.zone, cluster.schools);
            else showCard(cluster.schools[0]);
          });
          overlay.appendChild(pin);
        });
      }
      function filterZone(zone) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab-${zone === 'all' ? 'all' : zone}`).classList.add('active');
        closeAll();
        buildPins(zone);
      }
      function showZoneList(zone, list) {
        const zoneInfo = zones[zone];
        document.getElementById('zone-list-title').textContent = `Zon ${zoneInfo.name}`;
        document.getElementById('zone-ketua').innerHTML =
          `<strong>Ketua Zon:</strong> ${zoneInfo.ketua} &nbsp;·&nbsp; <strong>${list.length} sekolah</strong>`;
        const ul = document.getElementById('school-list');
        ul.innerHTML = '';
        list.forEach(school => {
          const item = document.createElement('div');
          item.className = 'school-item';
          item.innerHTML = `
            <div class="school-dot" style="background:${zoneInfo.color}"></div>
            <div style="flex:1">
              <div class="school-name">${school.name}</div>
              <div class="school-code">${school.code}</div>
            </div>
            <span style="color:#ccc;font-size:18px;">›</span>`;
          item.addEventListener('click', () => showCard(school));
          ul.appendChild(item);
        });
        document.getElementById('zone-list-card').classList.add('visible');
        document.getElementById('overlay').classList.add('visible');
      }
      function showCard(school) {
        currentSchool = school;
        const zoneInfo = zones[school.zone];
        document.getElementById('card-name').textContent = school.name;
        document.getElementById('card-code').textContent = school.code;
        document.getElementById('card-zone').textContent = `Zon ${zoneInfo.name}`;
        document.getElementById('card-ketua').textContent = zoneInfo.ketua;
        const badge = document.getElementById('card-zone-badge');
        badge.textContent = zoneInfo.name;
        badge.style.background = zoneInfo.color;
        document.getElementById('zone-list-card').classList.remove('visible');
        document.getElementById('info-card').classList.add('visible');
        document.getElementById('overlay').classList.add('visible');
      }
      function closeCard() {
        document.getElementById('info-card').classList.remove('visible');
        document.getElementById('overlay').classList.remove('visible');
      }
      function closeAll() {
        document.getElementById('info-card').classList.remove('visible');
        document.getElementById('zone-list-card').classList.remove('visible');
        document.getElementById('overlay').classList.remove('visible');
        currentSchool = null;
      }
      function openMaps() {
        if (currentSchool) window.open(currentSchool.maps, '_blank');
      }
      function togglePreview() {
        previewMode = !previewMode;
        document.getElementById('preview-bg').classList.toggle('visible', previewMode);
        document.getElementById('detecting-screen').classList.toggle('hidden', previewMode);
        document.getElementById('preview-btn').textContent = previewMode ? '📷 AR Mode' : '🗺️ Pratonton';
      }
      window.addEventListener('load', () => {
        buildPins();
        document.getElementById('preview-bg').classList.add('visible');
        document.getElementById('detecting-screen').classList.add('hidden');
        const target = document.getElementById('mural-target');
        if (target) {
          target.addEventListener('targetFound', () => {
            document.getElementById('detecting-screen').classList.add('hidden');
          });
          target.addEventListener('targetLost', () => {
            if (!previewMode)
              document.getElementById('detecting-screen').classList.remove('hidden');
          });
        }
      });
    </script>
  </body>
</html>
