<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PPD Kudat AR Map</title>
    <script src="libs/aframe.min.js"></script>
    <script src="libs/mindar-image-aframe.prod.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { overflow: hidden; font-family: sans-serif; }
      #topbar {
        position: fixed; top: 0; left: 0; right: 0;
        z-index: 100;
        background: rgba(255,255,255,0.97);
        padding: 10px 12px 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      }
      #topbar h1 { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
      #filter-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
      .tab {
        padding: 4px 12px; border-radius: 20px; font-size: 11px;
        font-weight: 500; border: none; cursor: pointer;
        white-space: nowrap; opacity: 0.45; transition: opacity 0.2s;
      }
      .tab.active { opacity: 1; }
      .tab-all { background: #1a1a1a; color: white; }
      .tab-pulau { background: #3B6D11; color: white; }
      .tab-pekan { background: #A32D2D; color: white; }
      .tab-sikuati { background: #3C3489; color: white; }
      .tab-matunggong { background: #BA7517; color: white; }

      #info-card {
        position: fixed; bottom: 0; left: 0; right: 0;
        z-index: 200; background: white;
        border-radius: 20px 20px 0 0;
        padding: 16px 20px 36px;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
        transform: translateY(100%);
        transition: transform 0.3s ease;
        max-height: 70vh; overflow-y: auto;
      }
      #info-card.visible { transform: translateY(0); }
      .card-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 14px; }
      .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
      .card-title { font-size: 15px; font-weight: 600; color: #1a1a1a; flex: 1; line-height: 1.3; }
      .card-zone-badge { font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 10px; color: white; margin-left: 8px; flex-shrink: 0; }
      #close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; padding: 0 0 0 8px; flex-shrink: 0; }
      .card-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
      .card-row:last-of-type { border-bottom: none; }
      .card-label { color: #888; flex-shrink: 0; margin-right: 8px; }
      .card-value { font-weight: 500; color: #1a1a1a; text-align: right; }
      #maps-btn {
        display: flex; align-items: center; justify-content: center; gap: 8px;
        width: 100%; margin-top: 14px; padding: 12px;
        background: #1a73e8; color: white; border: none;
        border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer;
      }

      #zone-list-card {
        position: fixed; bottom: 0; left: 0; right: 0;
        z-index: 200; background: white;
        border-radius: 20px 20px 0 0;
        padding: 16px 20px 36px;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
        transform: translateY(100%);
        transition: transform 0.3s ease;
        max-height: 75vh; overflow-y: auto;
      }
      #zone-list-card.visible { transform: translateY(0); }
      .zone-list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
      .zone-list-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
      .zone-list-count { font-size: 11px; color: #888; }
      .zone-ketua { font-size: 11px; color: #555; margin-bottom: 12px; padding: 8px 10px; background: #f8f8f8; border-radius: 8px; }
      .school-list-item {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer;
      }
      .school-list-item:last-child { border-bottom: none; }
      .school-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
      .school-list-name { font-size: 13px; color: #1a1a1a; flex: 1; }
      .school-list-code { font-size: 11px; color: #888; }
      .school-list-arrow { color: #ccc; font-size: 16px; }

      #pins-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 50; pointer-events: none;
      }
      .pin {
        position: absolute; width: 24px; height: 24px; border-radius: 50%;
        border: 2.5px solid white; display: flex; align-items: center;
        justify-content: center; font-size: 9px; font-weight: 600; color: white;
        cursor: pointer; pointer-events: all;
        transform: translate(-50%, -50%);
        box-shadow: 0 2px 6px rgba(0,0,0,0.35);
        transition: transform 0.15s;
      }
      .pin:active { transform: translate(-50%, -50%) scale(0.88); }
      .pin-pulau { background: #3B6D11; }
      .pin-pekan { background: #A32D2D; }
      .pin-sikuati { background: #3C3489; }
      .pin-matunggong { background: #BA7517; }
      .pin.hidden { display: none; }
      .pin-cluster { font-size: 10px; width: 28px; height: 28px; }

      #detecting-screen {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        z-index: 300; background: rgba(0,0,0,0.55);
        display: flex; align-items: center; justify-content: center;
      }
      #detecting-screen.hidden { display: none; }
      .detect-box {
        background: rgba(0,0,0,0.75); border-radius: 16px;
        padding: 24px 32px; text-align: center; color: white;
      }
      .detect-icon { font-size: 32px; margin-bottom: 8px; }
      .detect-title { font-size: 15px; font-weight: 600; }
      .detect-sub { font-size: 11px; color: #bbb; margin-top: 4px; }

      .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 150; display: none; }
      .overlay.visible { display: block; }
    </style>
  </head>

    <div id="topbar">
      <h1>Sekolah Daerah Kudat</h1>
      <div id="filter-tabs">
        <button class="tab tab-all active" onclick="filterZone('all')">Semua</button>
        <button class="tab tab-pulau" onclick="filterZone('pulau')">Pulau</button>
        <button class="tab tab-pekan" onclick="filterZone('pekan')">Pekan</button>
        <button class="tab tab-sikuati" onclick="filterZone('sikuati')">Sikuati</button>
        <button class="tab tab-matunggong" onclick="filterZone('matunggong')">Matunggong</button>
      </div>
    </div>

    <div id="detecting-screen">
      <div class="detect-box">
        <div class="detect-icon">📷</div>
        <div class="detect-title">Detecting Mural Map...</div>
        <div class="detect-sub">Make sure the entire map is visible</div>
      </div>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true;"
      color-space="sRGB" renderer="colorManagement: true"
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0" id="mural-target"></a-entity>
    </a-scene>

    <div id="pins-overlay"></div>
    <div class="overlay" id="overlay" onclick="closeAll()"></div>

        <div style="display:flex;align-items:center;gap:8px;">

          <button id="close-zone-btn" onclick="closeAll()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#888;">✕</button>
        </div>
      </div>
      <div class="zone-ketua" id="zone-ketua"></div>
      <div id="school-list"></div>
    </div>

      <button id="maps-btn" onclick="openMaps()">📍 Buka dalam Google Maps</button>

      let currentSchool = null;
      let currentFilter = 'all';

      function buildPins() {
        const overlay = document.getElementById('pins-overlay');
        overlay.innerHTML = '';

        // Group by proximity for clustering
        const zoneGroups = {};
        schools.forEach(s => {
          if (!zoneGroups[s.zone]) zoneGroups[s.zone] = [];
          zoneGroups[s.zone].push(s);
        });

        // Show one cluster pin per zone
        Object.keys(zoneGroups).forEach(zone => {
          const group = zoneGroups[zone];
          // Calculate center of zone
          const cx = group.reduce((a,s) => a + s.x, 0) / group.length;
          const cy = group.reduce((a,s) => a + s.y, 0) / group.length;

          const pin = document.createElement('div');
          pin.className = `pin pin-${zone} pin-cluster`;
          pin.id = `zone-pin-${zone}`;
          pin.style.left = cx + '%';
          pin.style.top = cy + '%';
          pin.innerHTML = group.length;
          pin.addEventListener('click', (e) => { e.stopPropagation(); showZoneList(zone); });
          overlay.appendChild(pin);
        });
      }

      function filterZone(zone) {
        currentFilter = zone;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab-${zone === 'all' ? 'all' : zone}`).classList.add('active');

        Object.keys({ pulau:1, pekan:1, sikuati:1, matunggong:1 }).forEach(z => {
          const pin = document.getElementById(`zone-pin-${z}`);
          if (!pin) return;
          if (zone === 'all' || z === zone) pin.classList.remove('hidden');
          else pin.classList.add('hidden');
        });
        closeAll();
      }

      function showZoneList(zone) {
        const zoneSchools = schools.filter(s => s.zone === zone);
        const zoneInfo = zones[zone];

        document.getElementById('zone-list-title').textContent = `Zon ${zoneInfo.name}`;
        document.getElementById('zone-list-count').textContent = `${zoneSchools.length} sekolah`;
        document.getElementById('zone-ketua').innerHTML = `<strong>Ketua Zon:</strong> ${zoneInfo.ketua}`;

        const list = document.getElementById('school-list');
        list.innerHTML = '';
        zoneSchools.forEach(school => {
          const item = document.createElement('div');
          item.className = 'school-list-item';
          item.innerHTML = `
            <div class="school-dot" style="background:${zoneInfo.color}"></div>
            <div style="flex:1">
              <div class="school-list-name">${school.name}</div>
              <div class="school-list-code">${school.code}</div>
            </div>
            <span class="school-list-arrow">›</span>
          `;
          item.addEventListener('click', () => showCard(school));
          list.appendChild(item);
        });

        document.getElementById('zone-list-card').classList.add('visible');
        document.getElementById('overlay').classList.add('visible');
      }

      function showCard(school) {
        currentSchool = school;
        const zoneInfo = zones[school.zone];
        document.getElementById('card-name').textContent = school.name;
        document.getElementById('card-code').textContent = school.code;
        document.getElementById('card-zone').textContent = `Zon ${zoneInfo.name}`;
        document.getElementById('card-ketua').textContent = zoneInfo.ketua;
        const badge = document.getElementById('card-zone-badge');
        badge.textContent = zoneInfo.name;
        badge.style.background = zoneInfo.color;
        document.getElementById('zone-list-card').classList.remove('visible');
        document.getElementById('info-card').classList.add('visible');
        document.getElementById('overlay').classList.add('visible');
      }

      function closeCard() {
        document.getElementById('info-card').classList.remove('visible');
        document.getElementById('overlay').classList.remove('visible');
        currentSchool = null;
      }

      function closeAll() {
        document.getElementById('info-card').classList.remove('visible');
        document.getElementById('zone-list-card').classList.remove('visible');
        document.getElementById('overlay').classList.remove('visible');
        currentSchool = null;
      }

      function openMaps() {
        if (currentSchool) window.open(currentSchool.maps, '_blank');
      }

      window.addEventListener('load', () => {
        buildPins();
        const target = document.getElementById('mural-target');
        if (target) {
          target.addEventListener('targetFound', () => {
            document.getElementById('detecting-screen').classList.add('hidden');
          });
          target.addEventListener('targetLost', () => {
            document.getElementById('detecting-screen').classList.remove('hidden');
          });
        }
      });
    </script>
  </body>
</html>
